<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#00ff88">
  <meta charset="UTF-8">
  <title>🔐 Admin Login</title>
  <style>
    body {
      background: radial-gradient(circle at top left, #0a0a0a, #000);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0,255,136,0.2);
      width: 320px;
      text-align: center;
      border: 1px solid rgba(0,255,136,0.3);
    }
    h1 { color: #00ff88; margin-bottom: 30px; }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #333;
      background: #000;
      color: #fff;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #00ff88;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.3s;
    }
    button:hover { background: #00cc6a; }
    
    .links { margin-top: 20px; font-size: 0.9em; }
    .links a { color: #aaa; text-decoration: none; margin: 0 5px; }
    .links a:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="login-box">
    <h1>🔐 Admin Portal</h1>
    
    {% if error %}
      <p style="color:#ff4444;">{{ error }}</p>
    {% endif %}

    <form method="POST">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="links">
      <a href="{{ url_for('professor_login') }}">Professor Login</a> | 
      <a href="{{ url_for('student_login') }}">Student Login</a>
    </div>
  </div>

</body>
</html>
