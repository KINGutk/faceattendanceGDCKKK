<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#00ff88">
  <meta charset="UTF-8">
  <title>👨‍🏫 Manage Faculty</title>
  <style>
    body {
      background: linear-gradient(135deg, #0f0f0f, #000);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      margin: 0; padding: 20px;
    }
    h1 {
      color: #00ff88;
      text-shadow: 0 0 15px #00ff88;
      margin-bottom: 10px;
    }
    p.info { color: #888; font-size: 0.9em; margin-bottom: 30px; }

    table {
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
      border-collapse: collapse;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 255, 136, 0.2);
    }
    th, td {
      padding: 15px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    th {
      color: #00ff88;
      text-transform: uppercase;
      background: rgba(0, 255, 136, 0.1);
    }
    tr:hover { background: rgba(255,255,255,0.02); }

    /* Action Buttons */
    .btn {
      text-decoration: none;
      padding: 8px 15px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 0.9em;
      margin-right: 5px;
      transition: 0.3s;
    }
    .btn-edit { background: rgba(255, 170, 0, 0.2); color: #ffaa00; border: 1px solid #ffaa00; }
    .btn-edit:hover { background: #ffaa00; color: #000; }
    
    .btn-delete { background: rgba(255, 68, 68, 0.2); color: #ff4444; border: 1px solid #ff4444; }
    .btn-delete:hover { background: #ff4444; color: #fff; }

    .center-btn { margin-top: 40px; }
    .btn-dash {
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      padding: 10px 25px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-dash:hover { background: #00ff88; color: #000; }
  </style>
</head>
<body>

  <h1>👨‍🏫 Faculty List</h1>
  <p class="info">
   To add a new professor, ask them to <strong>Sign Up</strong>, then approve them in <a href="{{ url_for('view_requests') }}" style="color:#00ff88;">View Requests</a>.
  </p>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for p in professors %}
      <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.email }}</td>
        <td style="color:#00ff88;">{{ p.status }}</td>
        <td>
          <a href="{{ url_for('edit_professor', id=p.id) }}" class="btn btn-edit">✏️ Edit</a>
          <a href="{{ url_for('delete_professor', id=p.id) }}" class="btn btn-delete" onclick="return confirm('Remove Dr. {{ p.name }}?')">🗑 Delete</a>
        </td>
      </tr>
      {% else %}
      <tr><td colspan="5" style="text-align:center; padding:30px; color:#666;">No approved professors found.</td></tr>
      {% endfor %}
    </tbody>
  </table>

  <div class="center-btn">
    <a href="{{ url_for('index') }}" class="btn-dash">🏠 Back to Dashboard</a>
  </div>

</body>
</html>
