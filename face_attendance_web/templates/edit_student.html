<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#00ff88">
  <meta charset="UTF-8">
  <title>✏️ Edit Student</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { color: #00ff88; text-shadow: 0 0 15px #00ff88; margin-bottom: 20px; }
    form {
      background: rgba(255,255,255,0.05);
      width: 400px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,255,136,0.2);
      border: 1px solid #00ff88;
    }
    input, select {
      width: 90%;
      margin: 10px 0;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 8px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      font-size: 16px;
    }
    button {
      background: #00ff88;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #000;
      box-shadow: 0 0 15px #00ff88;
      margin-top: 20px;
      transition: 0.3s;
      width: 100%;
    }
    button:hover { background: #00cc6a; transform: scale(1.02); }
    
    .center-btn { margin-top: 25px; }
    a { color: #00ff88; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>

  <h1>✏️ Edit Student Profile</h1>

  <form method="POST">
    <label style="float:left; color:#00ff88; font-weight:bold; font-size:0.9em;">Full Name</label>
    <input type="text" name="name" value="{{ student.name }}" required>

    <label style="float:left; color:#00ff88; font-weight:bold; font-size:0.9em;">Roll Number</label>
    <input type="text" name="roll_no" value="{{ student.roll_no }}" required>

    <label style="float:left; color:#00ff88; font-weight:bold; font-size:0.9em;">Email Address</label>
    <input type="email" name="email" value="{{ student.email }}" required>

    <label style="float:left; color:#00ff88; font-weight:bold; font-size:0.9em;">Semester</label>
    <select name="semester" required>
      <option value="1st Semester" {% if student.semester == '1st Semester' %}selected{% endif %}>1st Semester</option>
      <option value="2nd Semester" {% if student.semester == '2nd Semester' %}selected{% endif %}>2nd Semester</option>
      <option value="3rd Semester" {% if student.semester == '3rd Semester' %}selected{% endif %}>3rd Semester</option>
      <option value="4th Semester" {% if student.semester == '4th Semester' %}selected{% endif %}>4th Semester</option>
      <option value="5th Semester" {% if student.semester == '5th Semester' %}selected{% endif %}>5th Semester</option>
      <option value="6th Semester" {% if student.semester == '6th Semester' %}selected{% endif %}>6th Semester</option>
      <option value="7th Semester" {% if student.semester == '7th Semester' %}selected{% endif %}>7th Semester</option>
      <option value="8th Semester" {% if student.semester == '8th Semester' %}selected{% endif %}>8th Semester</option>
    </select>

    <button type="submit">💾 Save Changes</button>
  </form>

  <div class="center-btn">
    <a href="{{ url_for('manage_students') }}">⬅ Back to Student List</a>
  </div>

</body>
</html>
