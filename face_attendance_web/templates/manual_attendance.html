<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#00ff88">
  <meta charset="UTF-8">
  <title>📝 Manual Attendance</title>
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
      text-align: center; /* Center align by default */
    }
    
    h1 {
      color: #00ff88;
      text-shadow: 0 0 15px #00ff88;
      margin-bottom: 30px;
    }

    /* Controls Section */
    .controls-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      border: 1px solid rgba(0, 255, 136, 0.2);
      display: inline-flex; /* Center this block */
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    select, input {
      background: #000;
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 15px;
      font-size: 14px;
      outline: none;
    }
    
    button {
      background: #00ff88;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 10px 25px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background: #00cc6a;
      transform: scale(1.05);
    }

    /* Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 10px;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #333;
      text-align: left;
    }
    th {
      color: #00ff88;
      text-transform: uppercase;
    }
    td:first-child { border-left: 1px solid #333; }
    td:last-child { border-right: 1px solid #333; }

    /* Radio Buttons */
    .status-radio {
      margin-right: 15px;
      cursor: pointer;
    }
    
    /* Centered Dashboard Button */
    .center-btn {
      display: flex;
      justify-content: center;
      margin: 40px 0;
    }
    .btn-dashboard {
      background: transparent;
      border: 2px solid #00ff88;
      color: #00ff88;
      padding: 12px 30px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-dashboard:hover {
      background: #00ff88;
      color: #000;
    }
  </style>
</head>
<body>

  <h1>📝 Manual Attendance</h1>

  <div class="controls-container">
    <select id="subjectSelect" onchange="loadStudents()">
      <option value="" disabled selected>Select Class / Subject</option>
      {% for c in classes %}
        <option value="{{ c.id }}">{{ c.subject_name }} ({{ c.day_of_week }} - {{ c.semester }})</option>
      {% endfor %}
    </select>

    <input type="date" id="attendanceDate" value="{{ today }}" onchange="loadStudents()">
    
    <button onclick="saveAttendance()">💾 Save Attendance</button>
  </div>

  <div id="studentTableContainer">
    <table id="studentsTable">
      <thead>
        <tr>
          <th>Roll No</th>
          <th>Student Name</th>
          <th>Present</th>
          <th>Absent</th>
          <th>Leave</th>
        </tr>
      </thead>
      <tbody id="studentsBody">
        <tr><td colspan="5" style="text-align:center; padding:20px;">Please select a class.</td></tr>
      </tbody>
    </table>
  </div>

  <div class="center-btn">
    <a href="{{ url_for('index') }}" class="btn-dashboard">🏠 Back to Dashboard</a>
  </div>

  <script>
    let attendanceRecords = {};

    async function loadStudents() {
      const classId = document.getElementById('subjectSelect').value;
      const date = document.getElementById('attendanceDate').value;
      if (!classId) return;

      const tbody = document.getElementById('studentsBody');
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading students...</td></tr>';

      try {
        const response = await fetch(`/get_class_students/${classId}?date=${date}`);
        const data = await response.json();
        
        tbody.innerHTML = '';
        attendanceRecords = {}; // Reset

        if (data.students.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No approved students found in this semester.</td></tr>';
          return;
        }

        data.students.forEach(student => {
          const sid = student.id;
          const status = data.existing_attendance[sid] || ''; 
          attendanceRecords[sid] = status; // Init

          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${student.roll_no}</td>
            <td>${student.name}</td>
            <td><input type="radio" name="status_${sid}" class="status-radio" value="Present" ${status === 'Present' ? 'checked' : ''} onchange="updateStatus(${sid}, 'Present')"> 🟢</td>
            <td><input type="radio" name="status_${sid}" class="status-radio" value="Absent" ${status === 'Absent' ? 'checked' : ''} onchange="updateStatus(${sid}, 'Absent')"> 🔴</td>
            <td><input type="radio" name="status_${sid}" class="status-radio" value="Leave" ${status === 'Leave' ? 'checked' : ''} onchange="updateStatus(${sid}, 'Leave')"> 🟡</td>
          `;
          tbody.appendChild(row);
        });

      } catch (err) {
        console.error(err);
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">Error loading data.</td></tr>';
      }
    }

    function updateStatus(studentId, status) {
      attendanceRecords[studentId] = status;
    }

    async function saveAttendance() {
      const classId = document.getElementById('subjectSelect').value;
      const date = document.getElementById('attendanceDate').value;
      
      if (!classId) return alert("Select a class first!");

      try {
        const response = await fetch('/save_manual_attendance', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ class_id: classId, date: date, attendance: attendanceRecords })
        });
        const res = await response.json();
        if (res.success) alert("✅ Attendance Saved!");
        else alert("❌ Error: " + res.error);
      } catch (e) {
        alert("❌ Network Error");
      }
    }
  </script>

</body>
</html>
