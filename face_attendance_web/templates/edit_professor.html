<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#00ff88">
  <meta charset="UTF-8">
  <title>✏️ Edit Professor</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    
    .card {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 12px;
      border: 1px solid #00ff88;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
    }

    h1 { color: #00ff88; margin-top: 0; text-align: center; text-shadow: 0 0 10px #00ff88; }
    label { display: block; margin-top: 15px; color: #ccc; font-size: 0.9em; }
    
    input {
      width: 100%; padding: 12px; margin-top: 5px;
      border-radius: 8px; border: 1px solid #333;
      background: #000; color: #fff; box-sizing: border-box;
    }
    input:focus { border-color: #00ff88; outline: none; }

    button {
      background: #00ff88; border: none; padding: 12px;
      border-radius: 8px; font-weight: bold; width: 100%;
      margin-top: 25px; cursor: pointer; font-size: 1.1em;
      transition: 0.3s;
    }
    button:hover { background: #00cc6a; box-shadow: 0 0 15px #00cc6a; }

    .cancel { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
    .cancel:hover { color: #fff; }
  </style>
</head>
<body>

  <div class="card">
    <h1>✏️ Update Details</h1>
    
    <form method="POST">
      <label>Full Name</label>
      <input type="text" name="name" value="{{ professor.name }}" required>
      
      <label>Email Address</label>
      <input type="email" name="email" value="{{ professor.email }}" required>
      
      <button type="submit">💾 Save Changes</button>
    </form>

    <a href="{{ url_for('manage_professors') }}" class="cancel">Cancel</a>
  </div>

</body>
</html>
